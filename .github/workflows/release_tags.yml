name: release_tags

# Builds every project end-to-end (simulate + diagram + waveform) using
# the same Makefile targets CI uses, collects the generated FST dumps,
# PNGs, SVGs and JSON netlists into a single zip, and publishes a
# GitHub Release when a tag is pushed.

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  release:
    name: Build artifacts and publish release
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/naelolaiz/hdltools:netlistsvg-hierarchy
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Tool versions
        run: |
          echo "::group::tool versions"
          ghdl --version | head -n1
          yosys -V 2>&1 | head -n1 || true
          netlistsvg --help 2>&1 | head -n1 || true
          waveview --version 2>&1 | head -n1 || true
          python3 --version
          echo "::endgroup::"

      # `make all` forwards to simulate + diagram + waveform for every
      # discovered project (top-level Makefile).
      - name: Build every project
        run: make all

      # The hdltools image doesn't ship `zip` by default.
      - name: Install zip
        run: |
          if ! command -v zip >/dev/null 2>&1; then
            apt-get update && apt-get install -y --no-install-recommends zip
          fi

      - name: Collect artifacts
        run: |
          set -e
          mkdir -p release/fst release/svg release/png release/json
          find . -path '*/build/*.fst'  -exec cp {} release/fst/  \;
          find . -path '*/build/*.svg'  -exec cp {} release/svg/  \;
          find . -path '*/build/*.png'  -exec cp {} release/png/  \;
          find . -path '*/build/*.json' -exec cp {} release/json/ \;
          ( cd release && zip -r ../release-${{ github.ref_name }}.zip . )

      - name: Upload artifact to workflow run
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.ref_name }}
          path: release-${{ github.ref_name }}.zip
          if-no-files-found: error
          retention-days: 30

      # Skipped on manual dispatch from a branch — only publishes on tag.
      - name: Create Release and upload asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release-${{ github.ref_name }}.zip
